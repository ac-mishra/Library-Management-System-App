# ==========================================================
# Application Information
# ==========================================================

app.name=Library Management System
app.version=1.0.0
app.author=Amrit Chandan Mishra

# ==========================================================
# Database Configuration
# ==========================================================

db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=UTC
db.username=root
db.password=root

# ==========================================================
# Connection Pool (Reserved for Future Enhancement)
# ==========================================================

db.initialPoolSize=5
db.maxPoolSize=20

# ==========================================================
# Application Settings
# ==========================================================

app.fine.per.day=5
app.max.borrow.days=14
app.max.books.per.member=5

# ==========================================================
# Logging
# ==========================================================

log.level=INFO

# ==========================================================
# Reports
# ==========================================================

reports.directory=reports
exports.directory=exports

# ==========================================================
# File Upload
# ==========================================================

images.directory=images

# ==========================================================
# Date Format
# ==========================================================

date.format=dd-MM-yyyy

# ==========================================================
# Time Zone
# ==========================================================

timezone=Asia/Kolkata